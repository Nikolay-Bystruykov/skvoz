name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Test
        run: go test ./...

      - name: Build release binary
        run: |
          chmod +x scripts/package.sh scripts/stage-assets.sh
          scripts/package.sh "${GITHUB_REF_NAME}"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/skvoz.exe
            dist/skvoz.exe.sha256
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          body: |
            **Skvoz ${{ github.ref_name }}** — один файл, обход DPI для YouTube и Discord без VPN.

            ## Установка
            1. Скачайте **skvoz.exe** ниже.
            2. Дважды кликните. Windows покажет SmartScreen — нажмите **Подробнее → Всё равно запустить** (файл не подписан — это разовое предупреждение).
            3. Разрешите права администратора. В трее появится значок Skvoz. Готово — открывайте YouTube/Discord.

            Автозапуск с Windows включается галкой в меню трея. Проверить целостность файла — по `skvoz.exe.sha256`.
